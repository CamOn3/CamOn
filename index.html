<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAM ON</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      background: #000;
      overflow: hidden;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    canvas {
      display: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 26px 22px 34px;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.35) 0%,
        rgba(0,0,0,0.15) 20%,
        rgba(0,0,0,0.15) 60%,
        rgba(0,0,0,0.55) 100%
      );
      pointer-events: none;
    }

    .overlay > * {
      pointer-events: auto;
    }

    .top-light {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 18px rgba(255,255,255,0.9);
      margin-top: 6px;
    }

    .countdown {
      margin-top: 10px;
      padding: 10px 18px;
      border-radius: 10px;
      background: rgba(28,28,28,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 18px;
      letter-spacing: 4px;
      font-weight: 700;
    }

    .hero {
      text-align: center;
      margin-top: 10px;
      width: 100%;
    }

    .date {
      font-size: 18px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 6px;
    }

    .title {
      font-size: clamp(72px, 18vw, 118px);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: 2px;
      margin: 0;
      text-transform: uppercase;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 14px;
      letter-spacing: 6px;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .consent-wrap {
      width: 100%;
      max-width: 320px;
      margin: 18px auto 0;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      color: rgba(255,255,255,0.88);
      font-size: 14px;
      line-height: 1.45;
      text-align: left;
    }

    .consent-wrap input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      min-width: 24px;
      border: 2px solid rgba(255,255,255,0.85);
      border-radius: 6px;
      background: rgba(0,0,0,0.2);
      margin-top: 2px;
      position: relative;
      cursor: pointer;
    }

    .consent-wrap input[type="checkbox"]:checked::after {
      content: "✓";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      font-weight: 700;
    }

    .zoom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      margin-top: 14px;
      color: rgba(255,255,255,0.9);
      font-size: 16px;
    }

    .zoom .active {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .camera-controls {
      width: 100%;
      max-width: 320px;
      margin: 18px auto 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .side-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.35);
      color: white;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }

    .shutter {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.8);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
    }

    .shutter:disabled,
    .side-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .shutter-inner {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
      border: none;
    }

    .hint {
      margin-top: 12px;
      text-align: center;
      font-size: 15px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.82);
      text-transform: uppercase;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }

    .status {
      margin-top: 10px;
      min-height: 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.95);
      text-align: center;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }

    .fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      background: #000;
      z-index: 5;
    }

    @media (max-width: 380px) {
      .subtitle {
        letter-spacing: 4px;
        font-size: 12px;
      }

      .consent-wrap {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="fallback" id="fallback">
      <div>
        <p>Kamera konnte nicht geöffnet werden.</p>
        <p>Bitte erlaube den Kamerazugriff und lade die Seite neu.</p>
      </div>
    </div>

    <div class="overlay">
      <div style="display:flex; flex-direction:column; align-items:center;">
        <div class="top-light"></div>
        <div class="countdown" id="countdown">00:00:14</div>
      </div>

      <div class="hero">
        <div class="date">MARCH 13TH</div>
        <h1 class="title">CAM ON</h1>
        <div class="subtitle">INTERNATIONAL MUSIC VIBES</div>

        <div class="consent-wrap">
          <input type="checkbox" id="consent" />
          <label for="consent">
            Ich stimme zu, dass mein Foto auf Instagram und anderen Social-Media-Plattformen genutzt werden darf.
          </label>
        </div>

        <div class="zoom">
          <span>0.5</span>
          <span class="active">1×</span>
          <span>2</span>
          <span>3</span>
        </div>

        <div class="camera-controls">
          <button class="side-btn" id="switchBtn" type="button">↺</button>

          <button class="shutter" id="captureBtn" type="button" disabled>
            <span class="shutter-inner"></span>
          </button>

          <button class="side-btn" id="uploadBtn" type="button" disabled>↑</button>
        </div>

        <div class="hint" id="hint">BITTE ZUERST ZUSTIMMEN</div>
        <div class="status" id="status"></div>
      </div>

      <div></div>
    </div>
  </div>

  <script>
    const CLOUD_NAME = "dhl8ywkmb";
    const UPLOAD_PRESET = "camon_upload";

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const consent = document.getElementById("consent");
    const captureBtn = document.getElementById("captureBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const switchBtn = document.getElementById("switchBtn");
    const hint = document.getElementById("hint");
    const statusText = document.getElementById("status");
    const fallback = document.getElementById("fallback");
    const countdown = document.getElementById("countdown");

    let stream = null;
    let currentFacingMode = "environment";
    let capturedBlob = null;

    async function startCamera() {
      try {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: currentFacingMode },
          audio: false
        });

        video.srcObject = stream;
        fallback.style.display = "none";
        statusText.textContent = "";
      } catch (err) {
        fallback.style.display = "flex";
        statusText.textContent = "Kamera konnte nicht gestartet werden.";
      }
    }

    function updateButtons() {
      const allowed = consent.checked;
      captureBtn.disabled = !allowed;
      uploadBtn.disabled = !allowed || !capturedBlob;
      hint.textContent = allowed ? "JETZT FOTO MACHEN" : "BITTE ZUERST ZUSTIMMEN";
    }

    consent.addEventListener("change", updateButtons);

    captureBtn.addEventListener("click", () => {
      if (!consent.checked) return;

      const width = video.videoWidth;
      const height = video.videoHeight;

      if (!width || !height) {
        statusText.textContent = "Kamera ist noch nicht bereit.";
        return;
      }

      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, width, height);

      canvas.toBlob((blob) => {
        capturedBlob = blob;
        uploadBtn.disabled = false;
        statusText.textContent = "Foto aufgenommen. Jetzt hochladen.";
      }, "image/jpeg", 0.92);
    });

    uploadBtn.addEventListener("click", async () => {
      if (!capturedBlob || !consent.checked) return;

      statusText.textContent = "Foto wird hochgeladen...";

      const formData = new FormData();
      formData.append("file", capturedBlob, "camon-photo.jpg");
      formData.append("upload_preset", UPLOAD_PRESET);
      formData.append("folder", "camon_party");

      try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
          method: "POST",
          body: formData
        });

        if (!response.ok) throw new Error("Upload failed");

        statusText.textContent = "Foto erfolgreich hochgeladen.";
        capturedBlob = null;
        uploadBtn.disabled = true;
      } catch (err) {
        statusText.textContent = "Upload fehlgeschlagen.";
      }
    });

    switchBtn.addEventListener("click", async () => {
      currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
      await startCamera();
    });

    let seconds = 14;
    setInterval(() => {
      if (seconds > 0) seconds--;
      const ss = String(seconds).padStart(2, "0");
      countdown.textContent = `00:00:${ss}`;
    }, 1000);

    updateButtons();
    startCamera();
  </script>
</body>
</html>
