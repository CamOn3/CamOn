<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CAM ON</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      overflow: hidden;
      font-family: 'Montserrat', Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      background: #000;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px 18px 30px;
    }

    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 6px;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #1eff5a;
      box-shadow: 0 0 14px rgba(30,255,90,0.9);
    }

    .timer {
      background: #ff3647;
      color: #fff;
      padding: 11px 20px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
    }

    .hero {
      text-align: center;
      margin-top: 10px;
    }

    .date {
      font-size: 18px;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.95);
      margin-bottom: 12px;
    }

    .title {
      margin: 0;
      font-family: 'Anton', sans-serif;
      font-size: clamp(92px, 24vw, 150px);
      line-height: 0.9;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f2f2f2;
    }

    .subtitle {
      margin-top: 16px;
      font-size: 14px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.92);
      white-space: nowrap;
    }

    .brand {
      margin-top: 56px;
      font-family: 'Anton', sans-serif;
      font-size: 40px;
      letter-spacing: 1px;
      transform: skewX(-12deg);
      color: #fff;
    }

    .consent-box {
      margin: 34px auto 0;
      width: 100%;
      max-width: 330px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      text-align: left;
    }

    .consent-box input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      min-width: 24px;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 6px;
      background: rgba(255,255,255,0.02);
      position: relative;
      margin-top: 2px;
    }

    .consent-box input[type="checkbox"]:checked::after {
      content: "✓";
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .consent-box label {
      font-size: 14px;
      line-height: 1.45;
      color: rgba(255,255,255,0.92);
    }

    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
      margin-bottom: 4px;
    }

    .zoom {
      display: flex;
      align-items: center;
      gap: 30px;
      font-size: 18px;
      color: rgba(255,255,255,0.92);
    }

    .zoom-active {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(40,40,40,0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffd43b;
      font-weight: 700;
    }

    .controls {
      width: 100%;
      max-width: 360px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .side-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      background: rgba(35,35,35,0.95);
      color: #fff;
      font-size: 36px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .capture-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: rgba(52,52,52,0.96);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .capture-inner {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      background: #ff3647;
    }

    .upload-preview {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 6px solid rgba(70,70,70,0.95);
      background: #fff;
      cursor: pointer;
    }

    .hint {
      min-height: 22px;
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      text-align: center;
    }

    .hidden-input {
      display: none;
    }

    @media (max-width: 390px) {
      .title {
        font-size: 86px;
      }

      .subtitle {
        font-size: 12px;
        letter-spacing: 6px;
      }

      .brand {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="dot"></div>
      <div class="timer" id="timer">00:00:00</div>
    </div>

    <div class="hero">
      <div class="date">MARCH 13TH</div>
      <h1 class="title">CAM ON</h1>
      <div class="subtitle">INTERNATIONAL MUSIC VIBES</div>
      <div class="brand">APARTMENT</div>

      <div class="consent-box">
        <input type="checkbox" id="consent" />
        <label for="consent">
          Ich stimme zu, dass mein Foto auf Instagram und anderen Social-Media-Plattformen genutzt werden darf.
        </label>
      </div>
    </div>

    <div class="bottom">
      <div class="zoom">
        <span>0,5</span>
        <span class="zoom-active">1×</span>
        <span>2</span>
        <span>3</span>
      </div>

      <div class="controls">
        <button class="side-btn" type="button">❚❚</button>

        <button class="capture-btn" id="openCameraBtn" type="button">
          <span class="capture-inner"></span>
        </button>

        <button class="upload-preview" id="uploadPreviewBtn" type="button"></button>
      </div>

      <div class="hint" id="statusText">Bitte zuerst zustimmen.</div>
    </div>

    <input
      class="hidden-input"
      id="cameraInput"
      type="file"
      accept="image/*"
      capture="environment"
    />
  </div>

  <script>
    const CLOUD_NAME = "dhl8ywkmb";
    const UPLOAD_PRESET = "camon_upload";

    const consent = document.getElementById("consent");
    const openCameraBtn = document.getElementById("openCameraBtn");
    const cameraInput = document.getElementById("cameraInput");
    const statusText = document.getElementById("statusText");
    const timer = document.getElementById("timer");

    let seconds = 0;

    function formatTime(totalSeconds) {
      const hh = String(Math.floor(totalSeconds / 3600)).padStart(2, "0");
      const mm = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, "0");
      const ss = String(totalSeconds % 60).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    timer.textContent = formatTime(0);

    setInterval(() => {
      seconds++;
      timer.textContent = formatTime(seconds);
    }, 1000);

    openCameraBtn.addEventListener("click", () => {
      if (!consent.checked) {
        statusText.textContent = "Bitte zuerst zustimmen.";
        return;
      }

      statusText.textContent = "Kamera wird geöffnet...";
      cameraInput.click();
    });

    cameraInput.addEventListener("change", async (event) => {
      const file = event.target.files[0];

      if (!file) {
        statusText.textContent = "Kein Bild ausgewählt.";
        return;
      }

      statusText.textContent = "Foto wird hochgeladen...";

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);
      formData.append("folder", "camon_party");

      try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          throw new Error("Upload failed");
        }

        statusText.textContent = "Foto erfolgreich hochgeladen.";
        cameraInput.value = "";
      } catch (error) {
        statusText.textContent = "Upload fehlgeschlagen.";
      }
    });
  </script>
</body>
</html>
